<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Play Chess Against AI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

<style>
body{
    background:#202124;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:20px;
}

#board{
    width:560px;
    max-width:95vw;
}

h1{
    margin-bottom:15px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

#status{
    margin:15px;
    font-size:20px;
}
</style>
</head>
<body>

<h1>♟ Play Chess Against AI</h1>

<div id="status"></div>

<div id="board"></div>

<button onclick="resetGame()">New Game</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<script>

const game = new Chess();

const board = Chessboard('board',{
    draggable:true,
    position:'start',
    onDrop:onDrop
});

const engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish@16.1.0/src/stockfish.js");

engine.postMessage("uci");
engine.postMessage("isready");

engine.onmessage=function(event){

    const line=event.data;

    if(line.startsWith("bestmove")){

        const move=line.split(" ")[1];

        if(move==="(none)") return;

        game.move({
            from:move.substring(0,2),
            to:move.substring(2,4),
            promotion:'q'
        });

        board.position(game.fen());

        updateStatus();
    }

};

function onDrop(source,target){

    const move=game.move({
        from:source,
        to:target,
        promotion:'q'
    });

    if(move===null)
        return 'snapback';

    updateStatus();

    setTimeout(aiMove,200);

}

function aiMove(){

    if(game.game_over()) return;

    engine.postMessage("position fen "+game.fen());

    engine.postMessage("go depth 12");

}

function updateStatus(){

    if(game.in_checkmate()){
        status.innerHTML="Checkmate!";
        return;
    }

    if(game.in_draw()){
        status.innerHTML="Draw!";
        return;
    }

    if(game.in_check()){
        status.innerHTML="Check!";
    }else{
        status.innerHTML=(game.turn()==='w')
            ?"Your turn (White)"
            :"AI thinking...";
    }

}

function resetGame(){

    game.reset();
    board.start();
    updateStatus();

}

updateStatus();

</script>

</body>
</html>
